{% extends "base.html" %}
{% block title %}
    Blog
{% endblock %}

{% block content %}
<main class="container pt-5">
    <div class="d-flex">
        <ul class="list-inline mx-auto justify-content-center">
            {% for tag in page.tags.split() %}
            <li class="h5 list-inline-item pe-3"><a class="tags-item text-dark text-uppercase" href="{{ url_for('blog_page', filter_tag=tag) }}">{{ tag }}</a></li>
            {% endfor %}
        </ul>
    </div>
    <h1 class="display-2 text-center">{{ page.title }}</h1>
    <div class="row justify-content-center">
        <div class="col">
            <p class="h5 text-center fw-bold pt-2">{{ page.author }} | {{ page.date }}</p>
        </div>   
    </div>  
    <div class="row pt-5 justify-content-center">
        <div class="col ms-auto">
            {{ page.html|safe }}
        </div>
    </div>
</main>
{% endblock %}
