<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Arbitrage Against The Machine: Systematic Trading Blog" />
    <meta property="og:description" content="My quantitative finance blog and personal website." />
    <meta property="og:image" content="/static/img/og_image.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="manifest" href="/static/icons/site.webmanifest">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.3.1/highlight.min.js"></script>
    <link rel="stylesheet" href="/path/to/styles/default.css">
    <script src="/path/to/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel= "stylesheet" href= "{{ url_for('static',filename='custom.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;700&family=Playfair+Display:wght@700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet"> 
    <title>{% block title %} {% endblock %}</title>
</head>

<body>
    <div class="container">
        <header class="blog-header py-3">
            <div class="row flex-nowrap align-items-center">
                <div class="col">
                    <a class="blog-header-logo float-start" href="{{ url_for('home_page')}}">Arbitrage Against<br>The Machine</a>
                </div>
                <div class="col">
                    <nav class="nav float-end">
                        <a {% if request.path == url_for('home_page') %} class="p-3 active" {% else %} class="p-3 nav-link" {% endif %} 
                            href="{{ url_for('home_page')}}">/home</a>
                        <a {% if request.path == url_for('projects_page') %} class="p-3 active" {% else %} class="p-3 nav-link" {% endif %}
                            href="{{ url_for('projects_page')}}">/projects</a>
                        <a {% if request.path == url_for('blog_page') %} class="p-3 active" {% else %} class="p-3 nav-link" {% endif %}
                            href="{{ url_for('blog_page')}}">/blog</a>
                        <a {% if request.path == url_for('about_page') %} class="p-3 active" {% else %} class="p-3 nav-link" {% endif %}
                            href="{{ url_for('about_page')}}">/about</a>
                    </nav>
                </div>
            </div>
          </header>
    </div>
    {% block content %}
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous">
    </script>
</body>
</html>
